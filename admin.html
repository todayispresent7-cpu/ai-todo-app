<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo 관리자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Pretendard:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #191919;
        --sidebar: #1f1f1f;
        --border: rgba(255,255,255,0.07);
        --border-2: rgba(255,255,255,0.11);
        --text: rgba(255,255,255,0.88);
        --text-2: rgba(255,255,255,0.62);
        --text-3: rgba(255,255,255,0.38);
        --accent: #7c5cff;
        --accent-soft: rgba(124,92,255,0.15);
        --teal: #2dd4bf;
        --teal-soft: rgba(45,212,191,0.12);
        --danger: #fb7185;
        --danger-soft: rgba(251,113,133,0.12);
        --mono: 'Geist Mono', ui-monospace, monospace;
        --sans: 'Pretendard', ui-sans-serif, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        --radius: 10px;
        --radius-sm: 6px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
      }

      /* ── LOGIN SCREEN ── */
      .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(800px 420px at 20% 8%, rgba(124,92,255,0.18), transparent 55%),
                    radial-gradient(700px 400px at 80% 18%, rgba(45,212,191,0.10), transparent 60%),
                    linear-gradient(180deg, #0d0d0d 0%, #111 100%);
      }

      .login-box {
        width: 360px;
        border: 1px solid var(--border-2);
        border-radius: 16px;
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(20px);
        padding: 36px 32px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      }

      .login-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        display: grid;
        place-items: center;
        font-size: 20px;
        margin-bottom: 20px;
      }

      .login-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-bottom: 4px;
      }

      .login-sub {
        font-size: 13px;
        color: var(--text-3);
        margin-bottom: 28px;
      }

      .login-fields { display: grid; gap: 12px; margin-bottom: 16px; }

      .login-input {
        width: 100%;
        padding: 11px 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border-2);
        background: rgba(0,0,0,0.25);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .login-input:focus {
        border-color: rgba(124,92,255,0.5);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.12);
      }

      .login-input::placeholder { color: var(--text-3); }

      .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius);
        border: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        letter-spacing: -0.2px;
      }

      .login-btn:hover { background: #6b4de6; }
      .login-btn:active { transform: translateY(1px); }
      .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .login-error {
        margin-top: 12px;
        font-size: 12px;
        color: var(--danger);
        text-align: center;
        min-height: 18px;
      }

      .login-api {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .login-api-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
        white-space: nowrap;
      }

      .login-api-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 11px;
      }

      /* ── DASHBOARD ── */
      .dashboard { display: none; }
      .dashboard.visible { display: block; }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .header-left { display: flex; flex-direction: column; gap: 4px; }

      .header-left h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .header-sub { font-size: 13px; color: var(--text-3); }

      .header-right { display: flex; align-items: center; gap: 8px; }

      .admin-badge {
        font-family: var(--mono);
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(124,92,255,0.35);
        background: var(--accent-soft);
        color: var(--accent);
      }

      .grid { display: grid; gap: 16px; }

      .card {
        border: 1px solid var(--border-2);
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .card-h {
        padding: 14px 18px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-h h2 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-2);
        letter-spacing: -0.2px;
      }

      .card-b { padding: 16px 18px 18px; }

      .stat-cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      @media (max-width: 800px) { .stat-cards { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 480px) { .stat-cards { grid-template-columns: 1fr; } }

      .stat-card {
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.15);
        border-radius: var(--radius);
        padding: 14px;
        display: grid;
        gap: 6px;
      }

      .stat-k { font-size: 12px; color: var(--text-3); }
      .stat-v { font-size: 22px; font-weight: 900; letter-spacing: -0.4px; }
      .stat-sub { font-size: 11px; color: var(--text-3); }

      .btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-2);
        background: rgba(255,255,255,0.05);
        color: var(--text-2);
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn.primary {
        background: var(--accent);
        border-color: transparent;
        color: #fff;
        font-weight: 600;
      }

      .btn.primary:hover { background: #6b4de6; }

      .btn.danger {
        background: var(--danger-soft);
        border-color: rgba(251,113,133,0.3);
        color: var(--danger);
      }

      .btn.danger:hover { background: rgba(251,113,133,0.2); }

      .btn.ghost {
        background: transparent;
        border-color: transparent;
        color: var(--text-3);
      }

      .btn.ghost:hover { background: rgba(255,255,255,0.06); color: var(--text-2); border-color: transparent; }

      .table-wrap {
        overflow: auto;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.12);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 680px;
      }

      thead th {
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-3);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,10,0.6);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tbody td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text-2);
        vertical-align: middle;
      }

      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td { background: rgba(255,255,255,0.02); }

      .mono { font-family: var(--mono); font-size: 12px; }

      .badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--border-2);
        color: var(--text-3);
        background: rgba(255,255,255,0.05);
        white-space: nowrap;
        font-family: var(--mono);
      }

      .badge.ok {
        border-color: rgba(45,212,191,0.35);
        background: var(--teal-soft);
        color: var(--teal);
      }

      .badge.warn {
        border-color: rgba(251,113,133,0.35);
        background: var(--danger-soft);
        color: var(--danger);
      }

      .badge.admin {
        border-color: rgba(124,92,255,0.35);
        background: var(--accent-soft);
        color: var(--accent);
      }

      .user-detail {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 0;
      }

      @media (max-width: 700px) { .user-detail { grid-template-columns: 1fr; } }

      .inner-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(0,0,0,0.1);
        overflow: hidden;
      }

      .todo-list { display: grid; gap: 8px; }

      .todo-item {
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.12);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
      }

      .todo-item-title {
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }

      .todo-item-meta { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

      .todo-item-desc {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-3);
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status-text { font-size: 12px; color: var(--text-3); font-family: var(--mono); }

      .hint { font-size: 12px; color: var(--text-3); margin-top: 10px; line-height: 1.5; }

      .divider { height: 1px; background: var(--border); margin: 12px 0; }

      /* toast */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        max-width: min(480px, calc(100vw - 32px));
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(20,20,20,0.92);
        backdrop-filter: blur(12px);
        border-radius: 14px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        padding: 12px 14px;
        display: none;
        gap: 10px;
        align-items: flex-start;
        z-index: 9999;
        animation: slideUp 0.2s ease;
      }

      @keyframes slideUp {
        from { transform: translateX(-50%) translateY(10px); opacity: 0; }
        to { transform: translateX(-50%) translateY(0); opacity: 1; }
      }

      .toast.show { display: flex; }
      .t-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
      .t-msg { font-size: 12px; color: var(--text-2); line-height: 1.4; white-space: pre-wrap; }
      .t-right { margin-left: auto; }

      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.07) transparent; }
    </style>
  </head>
  <body>

    <!-- ── LOGIN SCREEN ── -->
    <div class="login-screen" id="loginScreen">
      <div class="login-box">
        <div class="login-icon">🛡️</div>
        <div class="login-title">관리자 로그인</div>
        <div class="login-sub">admin 계정으로만 접근 가능합니다</div>
        <div class="login-fields">
          <input class="login-input" id="loginUsername" placeholder="아이디" maxlength="50" autocomplete="username" />
          <input class="login-input" id="loginPassword" type="password" placeholder="비밀번호" maxlength="128" autocomplete="current-password" />
        </div>
        <button class="login-btn" id="loginBtn">로그인</button>
        <div class="login-error" id="loginError"></div>
        <div class="login-api">
          <span class="login-api-label">API</span>
          <input class="login-api-input" id="loginApiBase" type="text" spellcheck="false" />
        </div>
      </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div class="dashboard" id="dashboard">
      <div class="wrap">
        <header>
          <div class="header-left">
            <h1>관리자 대시보드</h1>
            <div class="header-sub" id="adminName">admin</div>
          </div>
          <div class="header-right">
            <span class="admin-badge">ADMIN</span>
            <button class="btn" id="refreshBtn">↺ 새로고침</button>
            <button class="btn ghost" id="goTodoBtn">← Todo로 이동</button>
            <button class="btn danger" id="logoutBtn">로그아웃</button>
          </div>
        </header>

        <div class="grid">

          <!-- 통계 -->
          <section class="card">
            <div class="card-h">
              <h2>통계</h2>
              <span class="status-text" id="statsStatus">불러오는 중…</span>
            </div>
            <div class="card-b">
              <div class="stat-cards" id="statsCards"></div>
            </div>
          </section>

          <!-- 사용자 목록 -->
          <section class="card">
            <div class="card-h">
              <h2>전체 사용자</h2>
              <span class="status-text" id="usersStatus">—</span>
            </div>
            <div class="card-b">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th style="width:60px">ID</th>
                      <th style="width:180px">아이디</th>
                      <th style="width:180px">가입일</th>
                      <th>할 일</th>
                      <th>완료</th>
                      <th>완료율</th>
                      <th style="width:160px">관리</th>
                    </tr>
                  </thead>
                  <tbody id="usersBody"></tbody>
                </table>
              </div>
              <div class="hint" id="usersHint" style="display:none">표시할 사용자가 없어요.</div>
            </div>
          </section>

          <!-- 사용자별 할 일 -->
          <section class="card">
            <div class="card-h">
              <h2>사용자별 할 일 현황</h2>
              <span class="status-text" id="userTodosTitle">사용자를 선택하세요</span>
            </div>
            <div class="card-b">
              <div class="user-detail">
                <div class="inner-card">
                  <div class="card-h">
                    <h2>요약</h2>
                    <span class="status-text" id="userSummaryText">—</span>
                  </div>
                  <div class="card-b" id="userSummaryCards"></div>
                </div>
                <div class="inner-card">
                  <div class="card-h">
                    <h2>할 일 목록</h2>
                    <span class="status-text" id="userTodosCount">0개</span>
                  </div>
                  <div class="card-b">
                    <div class="todo-list" id="userTodosList"></div>
                    <div class="hint" id="userTodosHint" style="display:none">이 사용자에게 할 일이 없습니다.</div>
                  </div>
                </div>
              </div>
              <div class="hint" style="margin-top:14px">ID를 클릭하면 해당 사용자의 할 일을 볼 수 있습니다.</div>
            </div>
          </section>

        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      <div>
        <div class="t-title" id="toastTitle">알림</div>
        <div class="t-msg" id="toastMsg"></div>
      </div>
      <div class="t-right">
        <button class="btn ghost" id="toastClose" style="font-size:11px;padding:4px 8px;">닫기</button>
      </div>
    </div>

    <script>
    (() => {
      const DEFAULT_API_BASE = "https://ai-todo-app-production-ca99.up.railway.app";
      const LS_API_BASE = "todo_api_base_v1";
      const LS_ADMIN_TOKEN = "todo_admin_token_v1"; // admin 전용 별도 키

      const $ = id => document.getElementById(id);

      const els = {
        loginScreen: $("loginScreen"),
        loginUsername: $("loginUsername"),
        loginPassword: $("loginPassword"),
        loginBtn: $("loginBtn"),
        loginError: $("loginError"),
        loginApiBase: $("loginApiBase"),
        dashboard: $("dashboard"),
        adminName: $("adminName"),
        refreshBtn: $("refreshBtn"),
        goTodoBtn: $("goTodoBtn"),
        logoutBtn: $("logoutBtn"),
        statsStatus: $("statsStatus"),
        statsCards: $("statsCards"),
        usersBody: $("usersBody"),
        usersHint: $("usersHint"),
        usersStatus: $("usersStatus"),
        userTodosTitle: $("userTodosTitle"),
        userSummaryText: $("userSummaryText"),
        userSummaryCards: $("userSummaryCards"),
        userTodosList: $("userTodosList"),
        userTodosCount: $("userTodosCount"),
        userTodosHint: $("userTodosHint"),
        toast: $("toast"),
        toastTitle: $("toastTitle"),
        toastMsg: $("toastMsg"),
        toastClose: $("toastClose"),
      };

      let state = {
        apiBase: DEFAULT_API_BASE,
        token: null,
        users: [],
        selectedUserId: null,
      };

      // ── TOAST ──
      let toastTimer = null;
      const toast = (title, msg) => {
        els.toastTitle.textContent = title;
        els.toastMsg.textContent = msg;
        els.toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 4000);
      };
      els.toastClose.addEventListener("click", () => els.toast.classList.remove("show"));

      // ── UTILS ──
      const sanitizeBase = s => (s || "").trim().replace(/\/+$/, "") || DEFAULT_API_BASE;
      const pct = v => `${Math.round((v || 0) * 1000) / 10}%`;
      const fmtDate = iso => {
        try {
          const d = new Date(iso);
          if (isNaN(d)) return "";
          return d.toLocaleString("ko-KR", { year:"2-digit", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
        } catch { return ""; }
      };
      const escapeHtml = s => String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");

      // ── API ──
      const api = async (path, opts = {}) => {
        const url = state.apiBase + path;
        const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
        if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
        const res = await fetch(url, { ...opts, headers });
        if (!res.ok) {
          let detail = "";
          try {
            const ct = res.headers.get("content-type") || "";
            if (ct.includes("application/json")) {
              const b = await res.json();
              detail = b?.detail || b?.message || JSON.stringify(b).slice(0, 200);
            } else { detail = (await res.text()).slice(0, 200); }
          } catch {}
          throw new Error(`HTTP ${res.status}${detail ? ` - ${detail}` : ""}`);
        }
        if (res.status === 204) return null;
        const ct = res.headers.get("content-type") || "";
        return ct.includes("application/json") ? res.json() : res.text();
      };

      // ── AUTH ──
      const showLogin = () => {
        els.loginScreen.style.display = "";
        els.dashboard.classList.remove("visible");
        els.loginError.textContent = "";
      };

      const showDashboard = (username) => {
        els.loginScreen.style.display = "none";
        els.dashboard.classList.add("visible");
        els.adminName.textContent = `${username} 님으로 로그인됨`;
        refreshAll();
      };

      const doLogin = async () => {
        const username = els.loginUsername.value.trim();
        const password = els.loginPassword.value;
        if (!username || !password) {
          els.loginError.textContent = "아이디와 비밀번호를 입력해주세요.";
          return;
        }
        els.loginBtn.disabled = true;
        els.loginError.textContent = "";
        try {
          const body = new URLSearchParams();
          body.set("username", username);
          body.set("password", password);
          body.set("grant_type", "password");
          const res = await fetch(state.apiBase + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          state.token = data.access_token;

          // admin 권한 확인
          const check = await fetch(state.apiBase + "/admin/stats", {
            headers: { "Authorization": `Bearer ${state.token}` }
          });
          if (check.status === 403) {
            state.token = null;
            els.loginError.textContent = "관리자 계정이 아닙니다.";
            return;
          }
          if (!check.ok) throw new Error(`HTTP ${check.status}`);

          sessionStorage.setItem(LS_ADMIN_TOKEN, state.token);
          showDashboard(username);
        } catch (e) {
          els.loginError.textContent = "로그인 실패: " + String(e?.message || e);
          state.token = null;
        } finally {
          els.loginBtn.disabled = false;
        }
      };

      const doLogout = () => {
        state.token = null;
        sessionStorage.removeItem(LS_ADMIN_TOKEN);
        showLogin();
      };

      // ── RENDER ──
      const renderStatsCards = (stats) => {
        const cards = [
          { k: "총 사용자 수", v: String(stats?.total_users ?? "—"), sub: "등록된 사용자" },
          { k: "총 할 일 수", v: String(stats?.total_todos ?? "—"), sub: "전체 합산" },
          { k: "완료된 할 일", v: String(stats?.done_todos ?? "—"), sub: "done=true" },
          { k: "완료율", v: pct(stats?.done_rate), sub: "완료 / 전체" },
        ];
        els.statsCards.innerHTML = "";
        for (const c of cards) {
          const el = document.createElement("div");
          el.className = "stat-card";
          el.innerHTML = `<div class="stat-k">${c.k}</div><div class="stat-v">${c.v}</div><div class="stat-sub">${c.sub}</div>`;
          els.statsCards.appendChild(el);
        }
      };

      const renderUsers = () => {
        const users = Array.isArray(state.users) ? state.users : [];
        els.usersBody.innerHTML = "";
        els.usersHint.style.display = users.length ? "none" : "block";
        els.usersStatus.textContent = `총 ${users.length}명`;

        for (const u of users) {
          const tr = document.createElement("tr");
          const isAdmin = u.username === "admin";

          const idTd = document.createElement("td");
          idTd.className = "mono";
          idTd.style.cursor = "pointer";
          idTd.style.color = "var(--accent)";
          idTd.textContent = `#${u.id}`;
          idTd.title = "클릭해서 할 일 현황 보기";
          idTd.addEventListener("click", () => loadUserTodos(u.id));

          const nameTd = document.createElement("td");
          nameTd.innerHTML = `${isAdmin ? '<span class="badge admin">admin</span> ' : ''}<span class="mono">${escapeHtml(u.username)}</span>`;

          const dateTd = document.createElement("td");
          dateTd.className = "mono";
          dateTd.textContent = u.created_at ? fmtDate(u.created_at) : "—";

          const todoTd = document.createElement("td");
          todoTd.textContent = `${u.todo_total ?? 0}개`;

          const doneTd = document.createElement("td");
          doneTd.textContent = `${u.todo_done ?? 0}개`;

          const rateTd = document.createElement("td");
          rateTd.innerHTML = `${pct(u.todo_done_rate)} ${u.todo_total ? '<span class="badge ok">활동</span>' : '<span class="badge">없음</span>'}`;

          const actionTd = document.createElement("td");
          const viewBtn = document.createElement("button");
          viewBtn.className = "btn primary";
          viewBtn.style.fontSize = "11px";
          viewBtn.style.padding = "5px 10px";
          viewBtn.textContent = "현황 보기";
          viewBtn.addEventListener("click", () => loadUserTodos(u.id));

          const delBtn = document.createElement("button");
          delBtn.className = "btn danger";
          delBtn.style.fontSize = "11px";
          delBtn.style.padding = "5px 10px";
          delBtn.style.marginLeft = "6px";
          delBtn.textContent = "삭제";
          delBtn.disabled = isAdmin;
          delBtn.title = isAdmin ? "admin 계정은 삭제 불가" : "";
          delBtn.addEventListener("click", () => onDeleteUser(u));

          actionTd.appendChild(viewBtn);
          actionTd.appendChild(delBtn);

          tr.appendChild(idTd);
          tr.appendChild(nameTd);
          tr.appendChild(dateTd);
          tr.appendChild(todoTd);
          tr.appendChild(doneTd);
          tr.appendChild(rateTd);
          tr.appendChild(actionTd);
          els.usersBody.appendChild(tr);
        }
      };

      const renderUserTodos = (out) => {
        const user = out?.user;
        const summary = out?.summary;
        const todos = Array.isArray(out?.todos) ? out.todos : [];
        state.selectedUserId = user?.id ?? null;

        els.userTodosTitle.textContent = user ? `${user.username} (#${user.id})` : "사용자를 선택하세요";
        els.userSummaryText.textContent = summary
          ? `${summary.todo_total}개 · 완료 ${summary.todo_done}개`
          : "—";

        // summary cards
        els.userSummaryCards.innerHTML = "";
        if (summary) {
          const items = [
            { k: "사용자", v: `${summary.username ?? "—"}` },
            { k: "가입일", v: summary.created_at ? fmtDate(summary.created_at) : "—" },
            { k: "총 할 일", v: String(summary.todo_total ?? 0) },
            { k: "완료율", v: pct(summary.todo_done_rate) },
          ];
          for (const it of items) {
            const el = document.createElement("div");
            el.className = "stat-card";
            el.style.minHeight = "64px";
            el.innerHTML = `<div class="stat-k">${it.k}</div><div class="stat-v" style="font-size:15px">${it.v}</div>`;
            els.userSummaryCards.appendChild(el);
          }
        }

        // todo list
        els.userTodosList.innerHTML = "";
        els.userTodosCount.textContent = `${todos.length}개`;
        els.userTodosHint.style.display = todos.length ? "none" : "block";

        for (const t of todos) {
          const item = document.createElement("div");
          item.className = "todo-item";

          const titleRow = document.createElement("div");
          titleRow.className = "todo-item-title";
          titleRow.innerHTML = `<span class="mono" style="color:var(--text-3)">#${t.id}</span> <span>${escapeHtml(t.title)}</span> <span class="badge ${t.done ? 'ok' : 'warn'}">${t.done ? '완료' : '진행 중'}</span>`;

          const meta = document.createElement("div");
          meta.className = "todo-item-meta";
          const ca = fmtDate(t.created_at);
          meta.textContent = ca ? `생성 ${ca}` : "";

          item.appendChild(titleRow);
          item.appendChild(meta);

          if (t.description) {
            const desc = document.createElement("div");
            desc.className = "todo-item-desc";
            desc.textContent = t.description;
            item.appendChild(desc);
          }
          els.userTodosList.appendChild(item);
        }
      };

      // ── LOAD ──
      const loadStats = async () => {
        els.statsStatus.textContent = "불러오는 중…";
        try {
          const stats = await api("/admin/stats");
          renderStatsCards(stats);
          els.statsStatus.textContent = "최신";
        } catch (e) {
          els.statsStatus.textContent = "실패";
          renderStatsCards({});
          toast("통계 로드 실패", String(e?.message || e));
        }
      };

      const loadUsers = async () => {
        els.usersStatus.textContent = "불러오는 중…";
        try {
          const users = await api("/admin/users");
          state.users = Array.isArray(users) ? users : [];
          renderUsers();
          els.usersStatus.textContent = `총 ${state.users.length}명`;
        } catch (e) {
          state.users = [];
          renderUsers();
          els.usersStatus.textContent = "실패";
          toast("사용자 목록 로드 실패", String(e?.message || e));
        }
      };

      const loadUserTodos = async (userId) => {
        els.userTodosTitle.textContent = `#${userId} 불러오는 중…`;
        try {
          const out = await api(`/admin/users/${userId}/todos`);
          renderUserTodos(out);
        } catch (e) {
          toast("할 일 불러오기 실패", String(e?.message || e));
          els.userTodosTitle.textContent = "사용자를 선택하세요";
        }
      };

      const onDeleteUser = async (u) => {
        if (!u || u.username === "admin") return;
        if (!confirm(`정말 삭제할까요?\n\n- 사용자: ${u.username} (#${u.id})\n- 해당 사용자의 할 일도 함께 삭제됩니다.`)) return;
        try {
          await api(`/admin/users/${u.id}`, { method: "DELETE" });
          toast("삭제 완료", `${u.username} 사용자를 삭제했습니다.`);
          if (state.selectedUserId === u.id) {
            els.userTodosTitle.textContent = "사용자를 선택하세요";
            els.userSummaryCards.innerHTML = "";
            els.userTodosList.innerHTML = "";
            els.userTodosCount.textContent = "0개";
            els.userTodosHint.style.display = "block";
          }
          await refreshAll();
        } catch (e) {
          toast("삭제 실패", String(e?.message || e));
        }
      };

      const refreshAll = async () => {
        await Promise.all([loadStats(), loadUsers()]);
      };

      // ── API BASE ──
      const savedBase = sessionStorage.getItem(LS_API_BASE);
      state.apiBase = sanitizeBase(savedBase || DEFAULT_API_BASE);
      els.loginApiBase.value = state.apiBase;

      let baseTimer = null;
      els.loginApiBase.addEventListener("input", () => {
        clearTimeout(baseTimer);
        baseTimer = setTimeout(() => {
          state.apiBase = sanitizeBase(els.loginApiBase.value);
          sessionStorage.setItem(LS_API_BASE, state.apiBase);
        }, 400);
      });

      // ── EVENTS ──
      els.loginBtn.addEventListener("click", doLogin);
      els.loginUsername.addEventListener("keydown", e => { if (e.key === "Enter") els.loginPassword.focus(); });
      els.loginPassword.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
      els.logoutBtn.addEventListener("click", doLogout);
      els.refreshBtn.addEventListener("click", refreshAll);
      els.goTodoBtn.addEventListener("click", () => location.href = "/");
      els.toastClose.addEventListener("click", () => els.toast.classList.remove("show"));

      // ── INIT ──
      const savedToken = sessionStorage.getItem(LS_ADMIN_TOKEN);
      if (savedToken) {
        state.token = savedToken;
        // 토큰 유효성 확인
        fetch(state.apiBase + "/admin/stats", {
          headers: { "Authorization": `Bearer ${savedToken}` }
        }).then(res => {
          if (res.ok) {
            showDashboard("admin");
          } else {
            sessionStorage.removeItem(LS_ADMIN_TOKEN);
            showLogin();
          }
        }).catch(() => showLogin());
      } else {
        showLogin();
      }
    })();
    </script>
  </body>
</html>
