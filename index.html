<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #191919;
        --sidebar: #1f1f1f;
        --sidebar-hover: #2a2a2a;
        --sidebar-active: #2f2f2f;
        --main: #191919;
        --border: rgba(255,255,255,0.07);
        --border-2: rgba(255,255,255,0.11);
        --text: rgba(255,255,255,0.88);
        --text-2: rgba(255,255,255,0.62);
        --text-3: rgba(255,255,255,0.38);
        --accent: #7c5cff;
        --accent-soft: rgba(124,92,255,0.15);
        --teal: #2dd4bf;
        --teal-soft: rgba(45,212,191,0.12);
        --danger: #fb7185;
        --danger-soft: rgba(251,113,133,0.12);
        --yellow: #f5c542;
        --radius-sm: 6px;
        --radius: 10px;
        --radius-lg: 14px;
        --mono: 'Geist Mono', ui-monospace, monospace;
        --sans: 'Pretendard', ui-sans-serif, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; overflow: hidden; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 260px;
        min-width: 260px;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 16px 14px 10px;
        border-bottom: 1px solid var(--border);
      }

      .workspace-name {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.15s;
      }

      .workspace-name:hover { background: var(--sidebar-hover); }

      .workspace-icon {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        display: grid;
        place-items: center;
        font-size: 13px;
        flex-shrink: 0;
      }

      .workspace-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.2px;
      }

      .auth-area {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }

      .auth-status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .auth-badge {
        font-size: 11px;
        font-family: var(--mono);
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--border-2);
        color: var(--text-3);
        background: transparent;
        transition: all 0.2s;
      }

      .auth-badge.logged-in {
        color: var(--teal);
        border-color: rgba(45,212,191,0.3);
        background: var(--teal-soft);
      }

      .auth-inputs {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 8px;
      }

      .auth-input {
        width: 100%;
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-2);
        background: rgba(0,0,0,0.2);
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .auth-input:focus {
        border-color: rgba(124,92,255,0.5);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.12);
      }

      .auth-input::placeholder { color: var(--text-3); }

      .auth-btns {
        display: flex;
        gap: 6px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 11px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-2);
        background: rgba(255,255,255,0.05);
        color: var(--text-2);
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn:hover {
        background: rgba(255,255,255,0.09);
        color: var(--text);
        border-color: var(--border-2);
      }

      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn.primary {
        background: var(--accent);
        border-color: transparent;
        color: #fff;
        font-weight: 600;
      }

      .btn.primary:hover { background: #6b4de6; }

      .btn.ghost {
        background: transparent;
        border-color: transparent;
        color: var(--text-3);
        padding: 7px 8px;
      }

      .btn.ghost:hover { background: var(--sidebar-hover); color: var(--text-2); border-color: transparent; }

      .btn.danger-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--text-3);
        padding: 4px 7px;
        font-size: 11px;
      }

      .btn.danger-ghost:hover { background: var(--danger-soft); color: var(--danger); border-color: transparent; }

      /* sidebar nav */
      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 8px 8px;
      }

      .sidebar-nav::-webkit-scrollbar { width: 4px; }
      .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

      .nav-section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 10px 8px 4px;
      }

      .todo-nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.12s;
        user-select: none;
        position: relative;
      }

      .todo-nav-item:hover { background: var(--sidebar-hover); }
      .todo-nav-item.active { background: var(--sidebar-active); }

      .todo-nav-item .nav-check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1.5px solid rgba(255,255,255,0.2);
        display: grid;
        place-items: center;
        flex-shrink: 0;
        transition: all 0.15s;
        font-size: 10px;
      }

      .todo-nav-item.done-item .nav-check {
        border-color: var(--teal);
        background: var(--teal-soft);
        color: var(--teal);
      }

      .nav-item-title {
        font-size: 13px;
        color: var(--text-2);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        transition: color 0.15s;
      }

      .todo-nav-item:hover .nav-item-title,
      .todo-nav-item.active .nav-item-title { color: var(--text); }

      .todo-nav-item.done-item .nav-item-title {
        text-decoration: line-through;
        color: var(--text-3);
      }

      .nav-del-btn {
        opacity: 0;
        transition: opacity 0.12s;
        padding: 2px 5px;
        border-radius: 4px;
        border: none;
        background: transparent;
        color: var(--text-3);
        font-size: 11px;
        cursor: pointer;
        line-height: 1;
      }

      .todo-nav-item:hover .nav-del-btn { opacity: 1; }
      .nav-del-btn:hover { background: var(--danger-soft); color: var(--danger); }

      .sidebar-footer {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
      }

      .api-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.15);
      }

      .api-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
        white-space: nowrap;
      }

      .api-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text-2);
        font-family: var(--mono);
        font-size: 11px;
        min-width: 0;
      }

      /* ── MAIN ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      .main-topbar {
        height: 48px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 28px;
        gap: 12px;
        flex-shrink: 0;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text-3);
      }

      .breadcrumb .crumb { color: var(--text-2); font-weight: 500; }
      .breadcrumb .sep { font-size: 11px; }

      .topbar-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .net-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--text-3);
        transition: background 0.3s;
        flex-shrink: 0;
      }

      .net-dot.ok { background: var(--teal); box-shadow: 0 0 6px rgba(45,212,191,0.5); }
      .net-dot.err { background: var(--danger); }

      .net-label {
        font-size: 12px;
        color: var(--text-3);
        font-family: var(--mono);
      }

      /* ── CONTENT AREA ── */
      .content-area {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* empty / no selection */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--text-3);
      }

      .empty-icon {
        font-size: 40px;
        opacity: 0.3;
      }

      .empty-text { font-size: 14px; }

      /* detail view */
      .detail-view {
        flex: 1;
        overflow-y: auto;
        padding: 48px 80px 80px;
        display: none;
      }

      .detail-view.visible { display: block; }

      .detail-view::-webkit-scrollbar { width: 5px; }
      .detail-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }

      .detail-done-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        cursor: pointer;
        width: fit-content;
        padding: 6px 10px;
        border-radius: var(--radius-sm);
        transition: background 0.15s;
      }

      .detail-done-toggle:hover { background: rgba(255,255,255,0.05); }

      .big-check {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 1.5px solid rgba(255,255,255,0.2);
        display: grid;
        place-items: center;
        font-size: 12px;
        transition: all 0.15s;
        flex-shrink: 0;
      }

      .big-check.done {
        border-color: var(--teal);
        background: var(--teal-soft);
        color: var(--teal);
      }

      .done-label { font-size: 13px; color: var(--text-3); }

      .detail-title-input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--sans);
        font-size: 36px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.8px;
        line-height: 1.2;
        margin-bottom: 6px;
        resize: none;
        overflow: hidden;
      }

      .detail-title-input::placeholder { color: var(--text-3); }
      .detail-title-input.done-title { color: var(--text-3); text-decoration: line-through; }

      .detail-meta {
        font-size: 12px;
        color: var(--text-3);
        font-family: var(--mono);
        margin-bottom: 28px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .detail-divider {
        height: 1px;
        background: var(--border);
        margin-bottom: 24px;
      }

      .detail-desc-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .detail-desc-input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-family: var(--sans);
        font-size: 15px;
        color: var(--text-2);
        line-height: 1.7;
        resize: none;
        min-height: 120px;
      }

      .detail-desc-input::placeholder { color: var(--text-3); }

      .detail-actions {
        margin-top: 32px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .save-hint {
        font-size: 11px;
        color: var(--text-3);
        font-family: var(--mono);
        margin-left: 4px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .save-hint.visible { opacity: 1; }

      /* new todo panel */
      .new-panel {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 48px 80px 80px;
      }

      .new-panel.visible { display: block; }

      .new-panel-title {
        font-size: 36px;
        font-weight: 700;
        color: var(--text-3);
        letter-spacing: -0.8px;
        margin-bottom: 28px;
      }

      .new-form { display: grid; gap: 16px; max-width: 560px; }

      .field-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .field-input {
        width: 100%;
        padding: 10px 12px;
        border-radius: var(--radius);
        border: 1px solid var(--border-2);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .field-input:focus {
        border-color: rgba(124,92,255,0.45);
        box-shadow: 0 0 0 3px rgba(124,92,255,0.1);
      }

      .field-input::placeholder { color: var(--text-3); }

      textarea.field-input {
        resize: vertical;
        min-height: 100px;
        line-height: 1.6;
      }

      .new-form-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* filter bar */
      .filter-bar {
        display: flex;
        gap: 4px;
        padding: 0 28px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .filter-tab {
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
        user-select: none;
      }

      .filter-tab:hover { color: var(--text-2); }
      .filter-tab.active { color: var(--text); border-bottom-color: var(--accent); }

      /* stats bar */
      .stats-row {
        padding: 8px 28px;
        font-size: 12px;
        color: var(--text-3);
        font-family: var(--mono);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      /* toast */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        max-width: min(480px, calc(100vw - 32px));
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(20,20,20,0.92);
        backdrop-filter: blur(12px);
        border-radius: var(--radius-lg);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        padding: 12px 14px;
        display: none;
        gap: 10px;
        align-items: flex-start;
        z-index: 9999;
        animation: slideUp 0.2s ease;
      }

      @keyframes slideUp {
        from { transform: translateX(-50%) translateY(10px); opacity: 0; }
        to { transform: translateX(-50%) translateY(0); opacity: 1; }
      }

      .toast.show { display: flex; }
      .t-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
      .t-msg { font-size: 12px; color: var(--text-2); line-height: 1.4; }
      .t-right { margin-left: auto; }

      /* scrollbar global */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.07) transparent;
      }

      @media (max-width: 700px) {
        .sidebar { width: 220px; min-width: 220px; }
        .detail-view, .new-panel { padding: 32px 24px 60px; }
        .detail-title-input { font-size: 26px; }
      }
    </style>
  </head>
  <body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="workspace-name">
          <div class="workspace-icon">✦</div>
          <span class="workspace-title">My Todo</span>
        </div>
      </div>

      <div class="auth-area">
        <div class="auth-status-row">
          <span class="auth-badge" id="authBadge">로그인 필요</span>
          <button class="btn ghost" id="logoutBtn" style="display:none;font-size:11px;padding:4px 7px;">로그아웃</button>
        </div>
        <div class="auth-inputs" id="authInputs">
          <input class="auth-input" id="username" placeholder="아이디" maxlength="50" autocomplete="username" />
          <input class="auth-input" id="password" type="password" placeholder="비밀번호 (6자 이상)" minlength="6" maxlength="128" autocomplete="current-password" />
          <div class="auth-btns">
            <button class="btn primary" id="loginBtn" style="flex:1;">로그인</button>
            <button class="btn" id="registerBtn">회원가입</button>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <div class="nav-section-label">페이지</div>
        <div id="navList"></div>
      </nav>

      <div class="sidebar-footer">
        <div class="api-pill">
          <span class="api-label">API</span>
          <input class="api-input" id="apiBase" type="text" spellcheck="false" />
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="main-topbar">
        <div class="breadcrumb">
          <span>My Todo</span>
          <span class="sep">›</span>
          <span class="crumb" id="topbarCrumb">할 일 선택</span>
        </div>
        <div class="topbar-actions">
          <div class="net-dot" id="netDot"></div>
          <span class="net-label" id="netLabel">확인 중…</span>
          <button class="btn" id="newTodoBtn">+ 새 페이지</button>
          <button class="btn ghost" id="refreshBtn">↺</button>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-tab active" data-filter="all">전체</div>
        <div class="filter-tab" data-filter="active">진행 중</div>
        <div class="filter-tab" data-filter="done">완료</div>
      </div>

      <div class="stats-row">
        <span id="statsText">0개</span>
      </div>

      <div class="content-area" id="contentArea">
        <!-- empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📋</div>
          <div class="empty-text">왼쪽에서 할 일을 선택하거나 새 페이지를 만들어보세요</div>
        </div>

        <!-- detail view -->
        <div class="detail-view" id="detailView">
          <div class="detail-done-toggle" id="doneToggle">
            <div class="big-check" id="bigCheck"></div>
            <span class="done-label" id="doneLabel">완료로 표시</span>
          </div>
          <textarea class="detail-title-input" id="detailTitle" placeholder="제목 없음" rows="1"></textarea>
          <div class="detail-meta" id="detailMeta"></div>
          <div class="detail-divider"></div>
          <div class="detail-desc-label">메모</div>
          <textarea class="detail-desc-input" id="detailDesc" placeholder="내용을 입력하세요…"></textarea>
          <div class="detail-actions">
            <button class="btn primary" id="saveBtn">저장</button>
            <button class="btn" id="aiStepsBtn">✦ AI 단계 생성</button>
            <button class="btn danger-ghost" id="deleteBtn">삭제</button>
            <span class="save-hint" id="saveHint">Ctrl+S로 저장</span>
          </div>
        </div>

        <!-- new todo panel -->
        <div class="new-panel" id="newPanel">
          <div class="new-panel-title">새 할 일</div>
          <div class="new-form">
            <div>
              <div class="field-label">제목</div>
              <input class="field-input" id="newTitle" placeholder="할 일을 입력하세요" maxlength="200" />
            </div>
            <div>
              <div class="field-label">메모 (선택)</div>
              <textarea class="field-input" id="newDesc" placeholder="메모를 적어두면 좋아요." maxlength="2000"></textarea>
            </div>
            <div class="new-form-actions">
              <button class="btn primary" id="addBtn">페이지 추가</button>
              <button class="btn" id="newAiBtn">✦ AI 단계 생성</button>
              <button class="btn ghost" id="cancelNewBtn">취소</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- TOAST -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      <div>
        <div class="t-title" id="toastTitle">알림</div>
        <div class="t-msg" id="toastMsg"></div>
      </div>
      <div class="t-right">
        <button class="btn ghost" id="toastClose" type="button" style="font-size:11px;padding:4px 8px;">닫기</button>
      </div>
    </div>

    <script>
    (() => {
      const DEFAULT_API_BASE = "https://ai-todo-app-production-ca99.up.railway.app";
      const LS_API_BASE = "todo_api_base_v1";
      const LS_TOKEN = "todo_jwt_token_v1";

      const $ = id => document.getElementById(id);

      const els = {
        apiBase: $("apiBase"),
        netDot: $("netDot"),
        netLabel: $("netLabel"),
        authBadge: $("authBadge"),
        authInputs: $("authInputs"),
        username: $("username"),
        password: $("password"),
        loginBtn: $("loginBtn"),
        registerBtn: $("registerBtn"),
        logoutBtn: $("logoutBtn"),
        navList: $("navList"),
        topbarCrumb: $("topbarCrumb"),
        newTodoBtn: $("newTodoBtn"),
        refreshBtn: $("refreshBtn"),
        filterTabs: document.querySelectorAll(".filter-tab"),
        statsText: $("statsText"),
        emptyState: $("emptyState"),
        detailView: $("detailView"),
        doneToggle: $("doneToggle"),
        bigCheck: $("bigCheck"),
        doneLabel: $("doneLabel"),
        detailTitle: $("detailTitle"),
        detailMeta: $("detailMeta"),
        detailDesc: $("detailDesc"),
        saveBtn: $("saveBtn"),
        aiStepsBtn: $("aiStepsBtn"),
        deleteBtn: $("deleteBtn"),
        saveHint: $("saveHint"),
        newPanel: $("newPanel"),
        newTitle: $("newTitle"),
        newDesc: $("newDesc"),
        addBtn: $("addBtn"),
        newAiBtn: $("newAiBtn"),
        cancelNewBtn: $("cancelNewBtn"),
        toast: $("toast"),
        toastTitle: $("toastTitle"),
        toastMsg: $("toastMsg"),
        toastClose: $("toastClose"),
      };

      let state = {
        todos: [],
        selectedId: null,
        filter: "all",
        apiBase: DEFAULT_API_BASE,
        token: null,
        dirty: false,
      };

      // ── TOAST ──
      let toastTimer = null;
      const toast = (title, msg) => {
        els.toastTitle.textContent = title;
        els.toastMsg.textContent = msg;
        els.toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 4000);
      };
      els.toastClose.addEventListener("click", () => els.toast.classList.remove("show"));

      // ── UTILS ──
      const sanitizeBase = s => {
        const v = (s || "").trim().replace(/\/+$/, "");
        return v.length ? v : DEFAULT_API_BASE;
      };

      const fmtDate = iso => {
        try {
          const d = new Date(iso);
          if (isNaN(d)) return "";
          return d.toLocaleString("ko-KR", { year:"2-digit", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
        } catch { return ""; }
      };

      // ── API ──
      const api = async (path, opts = {}) => {
        const url = state.apiBase + path;
        const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
        if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
        const res = await fetch(url, { ...opts, headers });
        if (!res.ok) {
          let detail = "";
          try {
            const ct = res.headers.get("content-type") || "";
            if (ct.includes("application/json")) {
              const b = await res.json();
              detail = b?.detail || b?.message || JSON.stringify(b).slice(0, 200);
            } else { detail = (await res.text()).slice(0, 200); }
          } catch {}
          throw new Error(`HTTP ${res.status}${detail ? ` - ${detail}` : ""}`);
        }
        if (res.status === 204) return null;
        const ct = res.headers.get("content-type") || "";
        return ct.includes("application/json") ? res.json() : res.text();
      };

      // ── NETWORK ──
      const setNet = (ok, msg) => {
        els.netDot.className = "net-dot" + (ok ? " ok" : " err");
        els.netLabel.textContent = msg;
      };

      const checkHealth = async () => {
        try { await api("/health"); setNet(true, "연결됨"); }
        catch { setNet(false, "연결 실패"); }
      };

      // ── AUTH ──
      const setAuthUI = () => {
        if (state.token) {
          els.authBadge.textContent = "로그인됨";
          els.authBadge.className = "auth-badge logged-in";
          els.authInputs.style.display = "none";
          els.logoutBtn.style.display = "";
        } else {
          els.authBadge.textContent = "로그인 필요";
          els.authBadge.className = "auth-badge";
          els.authInputs.style.display = "";
          els.logoutBtn.style.display = "none";
        }
      };

      const doLogin = async () => {
        const username = els.username.value.trim();
        const password = els.password.value;
        if (!username || !password) { toast("입력 필요", "아이디와 비밀번호를 입력해주세요."); return; }
        els.loginBtn.disabled = true;
        try {
          const body = new URLSearchParams();
          body.set("username", username);
          body.set("password", password);
          body.set("grant_type", "password");
          const res = await fetch(state.apiBase + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          state.token = data.access_token;
          sessionStorage.setItem(LS_TOKEN, state.token);
          setAuthUI();
          toast("로그인 성공", `${username}님 환영합니다.`);
          await loadTodos();
        } catch (e) {
          toast("로그인 실패", String(e?.message || e));
        } finally { els.loginBtn.disabled = false; }
      };

      const doRegister = async () => {
        const username = els.username.value.trim();
        const password = els.password.value;
        if (!username || !password) { toast("입력 필요", "아이디와 비밀번호를 입력해주세요."); return; }
        els.registerBtn.disabled = true;
        try {
          await api("/auth/register", { method: "POST", body: JSON.stringify({ username, password }) });
          toast("회원가입 완료", "로그인해주세요.");
        } catch (e) {
          toast("회원가입 실패", String(e?.message || e));
        } finally { els.registerBtn.disabled = false; }
      };

      const doLogout = () => {
        state.token = null;
        state.todos = [];
        state.selectedId = null;
        sessionStorage.removeItem(LS_TOKEN);
        setAuthUI();
        renderSidebar();
        showEmpty();
        toast("로그아웃 완료", "");
      };

      // ── LOAD ──
      const loadTodos = async () => {
        if (!state.token) {
          state.todos = [];
          renderSidebar();
          showEmpty();
          setNet(false, "로그인 필요");
          return;
        }
        try {
          const todos = await api("/todos", { method: "GET" });
          state.todos = Array.isArray(todos) ? todos : [];
          setNet(true, "연결됨");
          renderSidebar();
          // re-render detail if selected
          if (state.selectedId !== null) {
            const t = state.todos.find(x => x.id === state.selectedId);
            if (t) renderDetail(t); else showEmpty();
          }
          updateStats();
        } catch (e) {
          setNet(false, "연결 실패");
          toast("API 연결 실패", String(e?.message || e));
        }
      };

      // ── SIDEBAR RENDER ──
      const renderSidebar = () => {
        const filtered = state.todos.filter(t => {
          if (state.filter === "active") return !t.done;
          if (state.filter === "done") return !!t.done;
          return true;
        }).sort((a, b) => a.id - b.id);

        els.navList.innerHTML = "";
        for (const t of filtered) {
          const item = document.createElement("div");
          item.className = "todo-nav-item" + (t.done ? " done-item" : "") + (t.id === state.selectedId ? " active" : "");

          const chk = document.createElement("div");
          chk.className = "nav-check";
          chk.textContent = t.done ? "✓" : "";

          const lbl = document.createElement("div");
          lbl.className = "nav-item-title";
          lbl.textContent = t.title || "제목 없음";

          const del = document.createElement("button");
          del.className = "nav-del-btn";
          del.textContent = "✕";
          del.title = "삭제";
          del.addEventListener("click", e => { e.stopPropagation(); onDelete(t); });

          item.appendChild(chk);
          item.appendChild(lbl);
          item.appendChild(del);

          item.addEventListener("click", () => selectTodo(t));
          els.navList.appendChild(item);
        }

        updateStats();
      };

      const updateStats = () => {
        const all = state.todos;
        const done = all.filter(t => t.done).length;
        els.statsText.textContent = `총 ${all.length}개 · 완료 ${done}개 · 진행 중 ${all.length - done}개`;
      };

      // ── VIEWS ──
      const showEmpty = () => {
        els.emptyState.style.display = "";
        els.detailView.classList.remove("visible");
        els.newPanel.classList.remove("visible");
        els.topbarCrumb.textContent = "할 일 선택";
        state.selectedId = null;
      };

      const showNewPanel = () => {
        els.emptyState.style.display = "none";
        els.detailView.classList.remove("visible");
        els.newPanel.classList.add("visible");
        els.topbarCrumb.textContent = "새 페이지";
        state.selectedId = null;
        els.newTitle.value = "";
        els.newDesc.value = "";
        els.newTitle.focus();
        renderSidebar();
      };

      const selectTodo = (t) => {
        state.selectedId = t.id;
        state.dirty = false;
        els.emptyState.style.display = "none";
        els.newPanel.classList.remove("visible");
        els.detailView.classList.add("visible");
        renderDetail(t);
        renderSidebar();
      };

      const renderDetail = (t) => {
        // done toggle
        els.bigCheck.className = "big-check" + (t.done ? " done" : "");
        els.bigCheck.textContent = t.done ? "✓" : "";
        els.doneLabel.textContent = t.done ? "완료됨" : "완료로 표시";

        // title
        els.detailTitle.value = t.title || "";
        els.detailTitle.className = "detail-title-input" + (t.done ? " done-title" : "");
        autoResize(els.detailTitle);

        // meta
        const ca = fmtDate(t.created_at);
        const ua = fmtDate(t.updated_at);
        els.detailMeta.innerHTML = `
          <span>#${t.id}</span>
          ${ca ? `<span>생성 ${ca}</span>` : ""}
          ${ua && ua !== ca ? `<span>수정 ${ua}</span>` : ""}
        `;

        // desc
        els.detailDesc.value = t.description || "";
        autoResize(els.detailDesc);

        els.topbarCrumb.textContent = t.title || "제목 없음";
        state.dirty = false;
        els.saveHint.classList.remove("visible");
      };

      const autoResize = el => {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
      };

      // ── DETAIL ACTIONS ──
      els.doneToggle.addEventListener("click", async () => {
        const t = state.todos.find(x => x.id === state.selectedId);
        if (!t) return;
        const nextDone = !t.done;
        const prev = state.todos.slice();
        state.todos = state.todos.map(x => x.id === t.id ? { ...x, done: nextDone } : x);
        renderDetail({ ...t, done: nextDone });
        renderSidebar();
        try {
          const updated = await api(`/todos/${t.id}`, { method: "PATCH", body: JSON.stringify({ done: nextDone }) });
          state.todos = state.todos.map(x => x.id === t.id ? updated : x);
          renderDetail(updated);
        } catch (e) {
          state.todos = prev;
          renderDetail(t);
          renderSidebar();
          toast("실패", String(e?.message || e));
        }
      });

      els.detailTitle.addEventListener("input", () => {
        autoResize(els.detailTitle);
        state.dirty = true;
        els.saveHint.classList.add("visible");
      });

      els.detailDesc.addEventListener("input", () => {
        autoResize(els.detailDesc);
        state.dirty = true;
        els.saveHint.classList.add("visible");
      });

      els.saveBtn.addEventListener("click", saveDetail);
      document.addEventListener("keydown", e => {
        if ((e.ctrlKey || e.metaKey) && e.key === "s") {
          e.preventDefault();
          if (state.selectedId !== null) saveDetail();
        }
      });

      async function saveDetail() {
        const t = state.todos.find(x => x.id === state.selectedId);
        if (!t) return;
        const title = els.detailTitle.value.trim();
        const description = els.detailDesc.value.trim() || null;
        if (!title) { toast("제목 필요", "제목을 입력해주세요."); return; }
        els.saveBtn.disabled = true;
        try {
          const updated = await api(`/todos/${t.id}`, { method: "PATCH", body: JSON.stringify({ title, description }) });
          state.todos = state.todos.map(x => x.id === t.id ? updated : x);
          renderDetail(updated);
          renderSidebar();
          state.dirty = false;
          els.saveHint.classList.remove("visible");
          toast("저장됨", "");
        } catch (e) {
          toast("저장 실패", String(e?.message || e));
        } finally { els.saveBtn.disabled = false; }
      }

      els.aiStepsBtn.addEventListener("click", () => runAiSteps(els.detailTitle, els.detailDesc, els.aiStepsBtn));
      els.newAiBtn.addEventListener("click", () => runAiSteps(els.newTitle, els.newDesc, els.newAiBtn));

      async function runAiSteps(titleEl, descEl, btn) {
        if (!state.token) { toast("로그인 필요", ""); return; }
        const title = titleEl.value.trim();
        if (!title) { toast("제목 필요", "먼저 제목을 입력해주세요."); titleEl.focus(); return; }
        btn.disabled = true;
        try {
          const out = await api("/todos/ai-steps", { method: "POST", body: JSON.stringify({ title }) });
          const steps = Array.isArray(out?.steps) ? out.steps : [];
          if (!steps.length) throw new Error("AI 응답에 steps가 없어요.");
          descEl.value = steps.slice(0, 5).map((s, i) => `${i + 1}. ${String(s).trim()}`).join("\n");
          autoResize(descEl);
          descEl.focus();
          if (state.selectedId !== null) { state.dirty = true; els.saveHint.classList.add("visible"); }
        } catch (e) {
          toast("AI 단계 생성 실패", String(e?.message || e));
        } finally { btn.disabled = false; }
      }

      const onDelete = async (todo) => {
        if (!state.token) { toast("로그인 필요", ""); return; }
        if (!confirm(`삭제할까요?\n\n${todo.title}`)) return;
        const prev = state.todos.slice();
        state.todos = state.todos.filter(t => t.id !== todo.id);
        if (state.selectedId === todo.id) showEmpty();
        renderSidebar();
        try {
          await api(`/todos/${todo.id}`, { method: "DELETE" });
        } catch (e) {
          state.todos = prev;
          renderSidebar();
          toast("삭제 실패", String(e?.message || e));
        }
      };

      els.deleteBtn.addEventListener("click", () => {
        const t = state.todos.find(x => x.id === state.selectedId);
        if (t) onDelete(t);
      });

      // ── NEW TODO ──
      els.newTodoBtn.addEventListener("click", () => {
        if (!state.token) { toast("로그인 필요", "로그인 후 할 일을 추가할 수 있습니다."); return; }
        showNewPanel();
      });

      els.cancelNewBtn.addEventListener("click", showEmpty);

      els.addBtn.addEventListener("click", async () => {
        if (!state.token) { toast("로그인 필요", ""); return; }
        const title = els.newTitle.value.trim();
        const description = els.newDesc.value.trim() || null;
        if (!title) { toast("제목 필요", "제목을 입력해주세요."); return; }
        els.addBtn.disabled = true;
        try {
          const created = await api("/todos", { method: "POST", body: JSON.stringify({ title, description }) });
          await loadTodos();
          selectTodo(created);
        } catch (e) {
          toast("추가 실패", String(e?.message || e));
        } finally { els.addBtn.disabled = false; }
      });

      // ── FILTER ──
      els.filterTabs.forEach(tab => {
        tab.addEventListener("click", () => {
          els.filterTabs.forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          state.filter = tab.dataset.filter;
          renderSidebar();
        });
      });

      // ── REFRESH ──
      els.refreshBtn.addEventListener("click", loadTodos);

      // ── API BASE ──
      const savedBase = sessionStorage.getItem(LS_API_BASE);
      state.apiBase = sanitizeBase(savedBase || DEFAULT_API_BASE);
      els.apiBase.value = state.apiBase;

      let baseTimer = null;
      els.apiBase.addEventListener("input", () => {
        clearTimeout(baseTimer);
        baseTimer = setTimeout(() => {
          state.apiBase = sanitizeBase(els.apiBase.value);
          els.apiBase.value = state.apiBase;
          sessionStorage.setItem(LS_API_BASE, state.apiBase);
          checkHealth().then(loadTodos);
        }, 400);
      });

      // ── AUTH EVENTS ──
      els.loginBtn.addEventListener("click", doLogin);
      els.registerBtn.addEventListener("click", doRegister);
      els.logoutBtn.addEventListener("click", doLogout);
      els.username.addEventListener("keydown", e => { if (e.key === "Enter") els.password.focus(); });
      els.password.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

      // ── INIT ──
      state.token = sessionStorage.getItem(LS_TOKEN);
      setAuthUI();
      checkHealth().then(loadTodos);
    })();
    </script>
  </body>
</html>
